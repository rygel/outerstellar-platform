version: "3.9"

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: outerstellar
      POSTGRES_USER: outerstellar
      POSTGRES_PASSWORD: outerstellar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outerstellar -d outerstellar"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
