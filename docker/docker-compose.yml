services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - APP_PROFILE=prod
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?Set ADMIN_PASSWORD to a strong first-admin password}
      - TOKEN_PEPPER=${TOKEN_PEPPER:?Set TOKEN_PEPPER to at least 32 random bytes}
      - MANAGEMENT_TOKEN=${MANAGEMENT_TOKEN:?Set MANAGEMENT_TOKEN to at least 32 random bytes for remote probes}
    volumes:
      - app-data:/app/data

volumes:
  app-data:
