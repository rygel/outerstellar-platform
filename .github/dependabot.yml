version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "org.jetbrains.kotlin:*"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
    groups:
      http4k:
        patterns: ["org.http4k:*"]
      opentelemetry:
        patterns: ["io.opentelemetry:*"]
      koin:
        patterns: ["io.insert-koin:*"]
      jackson:
        patterns: ["com.fasterxml.jackson*:*"]
      logging:
        patterns: ["org.slf4j:*", "ch.qos.logback:*"]
      persistence:
        patterns: ["org.jooq:*", "org.jdbi:*", "com.h2database:*", "org.postgresql:*", "org.flywaydb:*"]
      micrometer:
        patterns: ["io.micrometer:*"]
      outerstellar:
        patterns: ["io.github.rygel:*"]
      test-frameworks:
        patterns: ["org.junit*:*", "io.mockk:*", "com.microsoft.playwright:*", "com.tngtech.archunit:*"]
        dependency-type: "development"
      build-plugins:
        patterns:
          - "com.github.spotbugs:*"
          - "io.gitlab.arturbosch.detekt:*"
          - "org.jacoco:*"
          - "com.diffplug.spotless:*"
          - "org.apache.maven.plugins:*"
          - "org.codehaus.mojo:*"
        dependency-type: "development"
      maven-all:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      npm-all:
        patterns: ["*"]
