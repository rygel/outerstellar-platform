name: Docker E2E

on:
  push:
    branches: [main, develop]
    paths:
      - 'docker/**'
      - 'platform-jte-extensions/**'
      - 'platform-extension-api/**'
      - 'outerstellar-i18n/**'
      - 'platform-web/**'
      - 'pom.xml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'docker/**'
      - 'platform-jte-extensions/**'
      - 'platform-extension-api/**'
      - 'outerstellar-i18n/**'
      - 'platform-web/**'
      - 'pom.xml'
  workflow_dispatch:

permissions: {}

concurrency:
  group: docker-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-e2e:
    name: Docker E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ci
    permissions:
      contents: read
    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      E2E_ADMIN_PASSWORD: e2eTestPassword123

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: outerstellar
          POSTGRES_USER: outerstellar
          POSTGRES_PASSWORD: e2e-test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U outerstellar -d outerstellar"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github-rygel
          server-username: GITHUB_ACTOR
          server-password: GH_PACKAGES_TOKEN

      - name: Restore Maven cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build Docker image with layer caching
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/Dockerfile.build
          target: jvm-runtime
          tags: outerstellar-platform:e2e
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start application container
        run: |
          docker run -d \
            --name outerstellar-e2e \
            --add-host=host.docker.internal:host-gateway \
            -p 8080:8080 \
            -e ADMIN_PASSWORD="${E2E_ADMIN_PASSWORD}" \
            -e DEVMODE=true \
            -e SESSIONCOOKIESECURE=false \
            -e "JDBC_URL=jdbc:postgresql://host.docker.internal:5432/outerstellar" \
            -e JDBC_USER=outerstellar \
            -e JDBC_PASSWORD=e2e-test-password \
            outerstellar-platform:e2e

      - name: Wait for application to be ready
        run: |
          echo "Waiting for application to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health | grep -q '"status":"UP"'; then
              echo "Application is ready after $((i * 5))s"
              exit 0
            fi
            echo "Attempt $i/30 — not ready yet, retrying in 5s..."
            sleep 5
          done
          echo "Application did not become ready within 150s"
          docker logs outerstellar-e2e
          exit 1

      - name: Install parent POM and dependencies locally
        run: |
          mvn install -N -q
          mvn install \
            -pl platform-jte-extensions,outerstellar-i18n,platform-core,platform-extension-api,platform-security,platform-testkit,platform-persistence-jdbi,platform-sync-client,platform-web \
            -DskipTests -Dexec.skip=true -q \
            -Ddetekt.skip=true -Dcheckstyle.skip=true -Dpmd.skip=true \
            -Dcpd.skip=true -Dspotbugs.skip=true -Dspotless.apply.skip=true \
            -Djacoco.skip=true -Denforcer.skip=true

      - name: Cache Playwright browsers
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: platform-web/target/playwright-browsers
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Run Playwright E2E tests against live container
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/platform-web/target/playwright-browsers
          E2E_BASE_URL: http://localhost:8080
        run: >
          mvn test -pl platform-web
          -Dgroups=e2e
          -DexcludedGroups=
          -Denforcer.skip=true
          -Ddetekt.skip=true
          -Dcheckstyle.skip=true
          -Dpmd.skip=true
          -Dcpd.skip=true
          -Dspotbugs.skip=true
          -Dspotless.apply.skip=true
          -Djacoco.skip=true
          -Dexec.skip=true

      - name: Collect container logs on failure
        if: failure()
        run: docker logs outerstellar-e2e

      - name: Stop and remove container
        if: always()
        run: docker rm -f outerstellar-e2e || true

      - name: Save Maven cache
        if: always() && github.event_name == 'push'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}

      - name: Save Playwright browser cache
        if: always() && github.event_name == 'push'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: platform-web/target/playwright-browsers
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
