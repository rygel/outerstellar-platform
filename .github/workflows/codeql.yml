name: CodeQL

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions: {}

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: read
      security-events: write
    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: '**/pom.xml'
          server-id: github-rygel
          server-username: GITHUB_ACTOR
          server-password: GH_PACKAGES_TOKEN

      - name: Cache CodeQL database
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.codeql/databases
          key: codeql-db-${{ hashFiles('**/pom.xml') }}
          restore-keys: codeql-db-

      - name: Configure Maven settings for GitHub Packages
        uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788 # v4.0.0
        with:
          servers: '[{"id": "github-rygel", "username": "${{ github.actor }}", "password": "${{ secrets.GH_PACKAGES_TOKEN }}"}]'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build
        run: >
          mvn install -q -DskipTests -T 1C
          -Djacoco.skip=true
          -Denforcer.skip=true
          -Ddetekt.skip=true
          -Dcheckstyle.skip=true
          -Dpmd.skip=true
          -Dcpd.skip=true
          -Dspotbugs.skip=true
          -Dspotless.apply.skip=true
          -Dspotless.check.skip=true
          -Dexec.skip=true

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: '/language:java-kotlin'
