name: CodeQL

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions: {}

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: read
      security-events: write
    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: '**/pom.xml'
          server-id: github-rygel
          server-username: GITHUB_ACTOR
          server-password: GH_PACKAGES_TOKEN

      - name: Cache CodeQL database
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.codeql/databases
          key: codeql-db-${{ hashFiles('**/pom.xml') }}
          restore-keys: codeql-db-

      - name: Configure Maven settings for GitHub Packages
        uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788 # v4.0.0
        with:
          servers: '[{"id": "github-rygel", "username": "${{ github.actor }}", "password": "${{ secrets.GH_PACKAGES_TOKEN }}"}]'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build
        run: >
          mvn install -q -DskipTests -T 1C
          -Djacoco.skip=true
          -Denforcer.skip=true
          -Ddetekt.skip=true
          -Dcheckstyle.skip=true
          -Dpmd.skip=true
          -Dcpd.skip=true
          -Dspotbugs.skip=true
          -Dspotless.apply.skip=true
          -Dspotless.check.skip=true
          -Dexec.skip=true

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: '/language:java-kotlin'
