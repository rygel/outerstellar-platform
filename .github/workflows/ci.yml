name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Test, and Quality
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: read
    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github-rygel
          server-username: GITHUB_ACTOR
          server-password: GH_PACKAGES_TOKEN

      - name: Set up Node.js 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci --no-audit --no-fund

      - name: Build and run all checks
        run: mvn verify -T 1C -pl core,persistence-jooq,persistence-jdbi,api-client,security,web

      - name: Cache build output for downstream jobs
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            core/target/
            persistence-jooq/target/
            api-client/target/
            security/target/
            web/target/
          key: build-${{ github.sha }}

      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-reports
          path: '**/target/site/jacoco/'
          retention-days: 14

  desktop-tests:
    name: Desktop Tests (Xvfb)
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: read
    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github-rygel
          server-username: GITHUB_ACTOR
          server-password: GH_PACKAGES_TOKEN

      - name: Restore build output
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            core/target/
            persistence-jooq/target/
            api-client/target/
            security/target/
            web/target/
          key: build-${{ github.sha }}

      - name: Install Xvfb
        run: sudo apt-get update -qq && sudo apt-get install -y -qq xvfb

      - name: Install parent POM locally
        run: mvn install -N -q

      - name: Install cached modules
        run: mvn install -pl core,persistence-jooq,api-client,security -DskipTests -q

      - name: Run desktop tests with virtual display
        run: >
          xvfb-run --auto-servernum mvn test -pl desktop
          -Ddesktop.headless=false
          -Ddetekt.skip=true
          -Dcheckstyle.skip=true
          -Dpmd.skip=true
          -Dcpd.skip=true
          -Dspotbugs.skip=true
          -Dspotless.apply.skip=true
          -Djacoco.skip=true

  e2e-tests:
    name: Playwright E2E Tests
    needs: build-and-test
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright/java:v1.58.0-noble
    permissions:
      contents: read
    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Configure Maven settings for GitHub Packages
        uses: s4u/maven-settings-action@v3.1.0
        with:
          servers: '[{"id": "github-rygel", "username": "${{ github.actor }}", "password": "${{ secrets.GH_PACKAGES_TOKEN }}"}]'

      - name: Restore build output
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            core/target/
            persistence-jooq/target/
            api-client/target/
            security/target/
            web/target/
          key: build-${{ github.sha }}

      - name: Install parent POM locally
        run: mvn install -N -q -s /github/home/.m2/settings.xml

      - name: Install cached modules
        run: mvn install -pl core,persistence-jooq,api-client,security,web -DskipTests -Dexec.skip=true -q -s /github/home/.m2/settings.xml

      - name: Run E2E tests
        run: >
          mvn test -pl web
          -s /github/home/.m2/settings.xml
          -Dgroups=e2e
          -DexcludedGroups=
          -Denforcer.skip=true
          -Dcheckstyle.skip=true
          -Dpmd.skip=true
          -Dcpd.skip=true
          -Dspotbugs.skip=true
          -Dspotless.apply.skip=true
          -Djacoco.skip=true
          -Ddetekt.skip=true

  security:
    name: Security (OWASP + Enforcer)
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: read
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github-rygel
          server-username: GITHUB_ACTOR
          server-password: GH_PACKAGES_TOKEN

      - name: Cache NVD database
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: nvd-${{ github.run_id }}
          restore-keys: nvd-

      - name: OWASP dependency check
        run: mvn dependency-check:aggregate -DskipTests
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload dependency check report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dependency-check-report
          path: 'target/dependency-check-report.html'
          retention-days: 30
