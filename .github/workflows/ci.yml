name: Outerstellar CI (Local Only)

on:
  # push:
  #   branches: [ main ]
  # pull_request:
  #   branches: [ main ]
  workflow_dispatch: # Allows manual trigger if ever needed, but prevents automatic runs on GitHub

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install dependencies
        run: mvn install -DskipTests

      - name: Run Detekt and Checkstyle
        run: mvn antrun:run@detekt checkstyle:check

      - name: Run Web Tests
        run: mvn test -pl web

      - name: Run Desktop Tests (Xvfb virtual display)
        run: |
          # Xvfb provides a virtual framebuffer so Swing GUI tests run without a physical display.
          # -Ddesktop.headless=false ensures java.awt.headless=false so tests are NOT skipped.
          sudo apt-get update
          sudo apt-get install -y xvfb
          xvfb-run --auto-servernum mvn test -pl desktop -Ddesktop.headless=false

      - name: Final Integration Test
        run: mvn test -pl core,persistence-jooq
