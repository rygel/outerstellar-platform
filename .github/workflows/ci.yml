name: CI

on:
  push:
    branches: [main, develop, sync/**]
  pull_request:
    branches: [main, develop, sync/**]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, Test, and Quality
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: read
    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github-rygel
          server-username: GITHUB_ACTOR
          server-password: GH_PACKAGES_TOKEN

      - name: Set up Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci --no-audit --no-fund

      - name: Populate dependency cache
        run: mvn dependency:go-offline -q 2>/dev/null || true

      - name: Compile, install, and run quality checks
        run: >
          mvn install -T 1C -DskipTests
          -Djacoco.skip=true
          -Denforcer.skip=true

      - name: Run additional quality checks
        if: github.event_name == 'push'
        run: >
          mvn checkstyle:check pmd:check pmd:cpd-check spotbugs:check detekt:check spotless:check -T 1C
          -Djacoco.skip=true
          -Denforcer.skip=true

      - name: Cache build output for downstream jobs
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            platform-core/target/
            platform-persistence-jooq/target/
            platform-persistence-jdbi/target/
            platform-sync-client/target/
            platform-security/target/
            platform-web/target/
          key: build-${{ github.sha }}

  unit-tests:
    name: Unit Tests (${{ matrix.modules }})
    needs: build
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - modules: core+security+sync
            pl: platform-core,platform-security,platform-sync-client
          - modules: persistence
            pl: platform-persistence-jooq,platform-persistence-jdbi
          - modules: web
            pl: platform-web
    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github-rygel
          server-username: GITHUB_ACTOR
          server-password: GH_PACKAGES_TOKEN

      - name: Restore build output
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            platform-core/target/
            platform-persistence-jooq/target/
            platform-persistence-jdbi/target/
            platform-sync-client/target/
            platform-security/target/
            platform-web/target/
          key: build-${{ github.sha }}

      - name: Install parent POM and dependencies
        run: >
          mvn install -N -q
          && mvn install -pl platform-core,platform-security,platform-sync-client,platform-persistence-jooq,platform-persistence-jdbi
          -DskipTests -q
          -Ddetekt.skip=true -Dcheckstyle.skip=true -Dpmd.skip=true
          -Dcpd.skip=true -Dspotbugs.skip=true -Dspotless.apply.skip=true
          -Djacoco.skip=true -Denforcer.skip=true

      - name: Run unit tests with coverage
        run: >
          mvn verify -pl ${{ matrix.pl }}
          -Ddetekt.skip=true -Dcheckstyle.skip=true -Dpmd.skip=true
          -Dcpd.skip=true -Dspotbugs.skip=true -Dspotless.apply.skip=true
          -Dspotless.check.skip=true -Denforcer.skip=true

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ matrix.modules }}
          path: '**/target/site/jacoco/'
          retention-days: 14

  desktop-tests:
    name: Desktop Tests (Xvfb)
    needs: build
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: read
    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github-rygel
          server-username: GITHUB_ACTOR
          server-password: GH_PACKAGES_TOKEN

      - name: Restore build output
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            platform-core/target/
            platform-persistence-jooq/target/
            platform-persistence-jdbi/target/
            platform-sync-client/target/
            platform-security/target/
            platform-web/target/
          key: build-${{ github.sha }}

      - name: Install Xvfb
        run: sudo apt-get update -qq && sudo apt-get install -y -qq xvfb

      - name: Install parent POM and modules locally
        run: >
          mvn install -N -q
          && mvn install
          -pl platform-core,platform-persistence-jooq,platform-sync-client,platform-security
          -DskipTests -q
          -Ddetekt.skip=true -Dcheckstyle.skip=true -Dpmd.skip=true
          -Dcpd.skip=true -Dspotbugs.skip=true -Dspotless.apply.skip=true
          -Djacoco.skip=true -Denforcer.skip=true

      - name: Run desktop tests with virtual display
        run: >
          xvfb-run --auto-servernum mvn test -pl platform-desktop
          -Ddesktop.headless=false
          -Ddetekt.skip=true -Dcheckstyle.skip=true -Dpmd.skip=true
          -Dcpd.skip=true -Dspotbugs.skip=true -Dspotless.apply.skip=true
          -Djacoco.skip=true

  e2e-tests:
    name: Playwright E2E Tests
    needs: build
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: read
    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github-rygel
          server-username: GITHUB_ACTOR
          server-password: GH_PACKAGES_TOKEN

      - name: Restore build output
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            platform-core/target/
            platform-persistence-jooq/target/
            platform-persistence-jdbi/target/
            platform-sync-client/target/
            platform-security/target/
            platform-web/target/
          key: build-${{ github.sha }}

      - name: Install parent POM and modules locally
        run: >
          mvn install -N -q
          && mvn install
          -pl platform-core,platform-persistence-jooq,platform-sync-client,platform-security,platform-web
          -DskipTests -Dexec.skip=true -q
          -Ddetekt.skip=true -Dcheckstyle.skip=true -Dpmd.skip=true
          -Dcpd.skip=true -Dspotbugs.skip=true -Dspotless.apply.skip=true
          -Djacoco.skip=true -Denforcer.skip=true

      - name: Run E2E tests
        run: >
          mvn test -pl platform-web
          -Dgroups=e2e
          -DexcludedGroups=
          -Denforcer.skip=true
          -Dcheckstyle.skip=true -Dpmd.skip=true -Dcpd.skip=true
          -Dspotbugs.skip=true -Dspotless.apply.skip=true
          -Djacoco.skip=true -Ddetekt.skip=true -Dexec.skip=true

  coverage:
    name: Coverage Report
    needs: unit-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: always()

    steps:
      - name: Download coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-*
          path: coverage-reports
          merge-multiple: true

      - name: Upload merged coverage reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          path: coverage-reports/
          retention-days: 14

  security:
    name: Security (OWASP + Enforcer)
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: read
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github-rygel
          server-username: GITHUB_ACTOR
          server-password: GH_PACKAGES_TOKEN

      - name: Cache NVD database
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: nvd-${{ github.run_id }}
          restore-keys: nvd-

      - name: OWASP dependency check
        run: mvn org.owasp:dependency-check-maven:aggregate -DskipTests
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload dependency check report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-check-report
          path: 'target/dependency-check-report.html'
          retention-days: 30
