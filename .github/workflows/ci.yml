name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, Test, and Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ci
    permissions:
      contents: read
    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: '**/pom.xml'
          server-id: github-rygel
          server-username: GITHUB_ACTOR
          server-password: GH_PACKAGES_TOKEN

      - name: Set up Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        run: npm ci --no-audit --no-fund

      - name: Populate dependency cache
        run: mvn org.apache.maven.plugins:maven-dependency-plugin:3.8.1:go-offline -q 2>/dev/null || true

      - name: Compile, install, and run quality checks
        run: |
          for i in 1 2 3; do
            mvn install -T 1C -DskipTests \
              -Djacoco.skip=true \
              -Denforcer.skip=true \
              --fail-at-end && exit 0
            echo "Maven build attempt $i failed, retrying in 10s..."
            sleep 10
          done
          exit 1

      - name: Run additional quality checks
        if: github.event_name == 'push'
        run: >
          mvn checkstyle:check pmd:check pmd:cpd-check spotbugs:check detekt:check spotless:check -T 1C
          -Djacoco.skip=true
          -Denforcer.skip=true

      - name: Cache build output for downstream jobs
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            platform-jte-extensions/target/
            outerstellar-i18n/target/
            platform-core/target/
            platform-extension-api/target/
            platform-testkit/target/
            platform-persistence-jdbi/target/
            platform-sync-client/target/
            platform-security/target/
            platform-web/target/
          key: build-${{ github.sha }}

  unit-tests:
    name: Unit Tests (${{ matrix.modules }})
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ci
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - modules: core+security+sync
            pl: outerstellar-i18n,platform-core,platform-security,platform-sync-client
          - modules: persistence
            pl: platform-persistence-jdbi
          - modules: web
            pl: platform-web
    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: '**/pom.xml'
          server-id: github-rygel
          server-username: GITHUB_ACTOR
          server-password: GH_PACKAGES_TOKEN

      - name: Restore build output
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            platform-jte-extensions/target/
            outerstellar-i18n/target/
            platform-core/target/
            platform-extension-api/target/
            platform-testkit/target/
            platform-persistence-jdbi/target/
            platform-sync-client/target/
            platform-security/target/
            platform-web/target/
          key: build-${{ github.sha }}

      - name: Install parent POM and dependencies
        run: >
          mvn install -N -q
          && mvn install -pl platform-jte-extensions,outerstellar-i18n,platform-core,platform-extension-api,platform-security,platform-testkit,platform-sync-client,platform-persistence-jdbi
          -DskipTests -q
          -Ddetekt.skip=true -Dcheckstyle.skip=true -Dpmd.skip=true
          -Dcpd.skip=true -Dspotbugs.skip=true -Dspotless.apply.skip=true
          -Djacoco.skip=true -Denforcer.skip=true

      - name: Run unit tests with coverage
        run: >
          mvn verify -pl ${{ matrix.pl }}
          -Ddetekt.skip=true -Dcheckstyle.skip=true -Dpmd.skip=true
          -Dcpd.skip=true -Dspotbugs.skip=true -Dspotless.apply.skip=true
          -Dspotless.check.skip=true -Denforcer.skip=true

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ matrix.modules }}
          path: '**/target/site/jacoco/'
          retention-days: 14

  desktop-tests:
    name: Desktop Tests (Xvfb)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ci
    permissions:
      contents: read
    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: '**/pom.xml'
          server-id: github-rygel
          server-username: GITHUB_ACTOR
          server-password: GH_PACKAGES_TOKEN

      - name: Restore build output
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            platform-jte-extensions/target/
            outerstellar-i18n/target/
            platform-core/target/
            platform-extension-api/target/
            platform-testkit/target/
            platform-persistence-jdbi/target/
            platform-sync-client/target/
            platform-security/target/
            platform-web/target/
          key: build-${{ github.sha }}

      - name: Install Xvfb
        run: sudo apt-get update -qq && sudo apt-get install -y -qq xvfb

      - name: Install parent POM and modules locally
        run: >
          mvn install -N -q
          && mvn install
          -pl outerstellar-i18n,outerstellar-i18n-validator,outerstellar-i18n-validator-maven-plugin,platform-core,platform-extension-api,platform-testkit,platform-persistence-jdbi,platform-sync-client,platform-security
          -DskipTests -q
          -Ddetekt.skip=true -Dcheckstyle.skip=true -Dpmd.skip=true
          -Dcpd.skip=true -Dspotbugs.skip=true -Dspotless.apply.skip=true
          -Djacoco.skip=true -Denforcer.skip=true

      - name: Run desktop tests with virtual display
        run: >
          xvfb-run --auto-servernum mvn test -pl platform-desktop -am
          -Ddesktop.headless=false
          -Ddetekt.skip=true -Dcheckstyle.skip=true -Dpmd.skip=true
          -Dcpd.skip=true -Dspotbugs.skip=true -Dspotless.apply.skip=true
          -Djacoco.skip=true

  e2e-tests:
    name: Playwright E2E Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ci
    permissions:
      contents: read
    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: '**/pom.xml'
          server-id: github-rygel
          server-username: GITHUB_ACTOR
          server-password: GH_PACKAGES_TOKEN

      - name: Restore build output
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            platform-jte-extensions/target/
            outerstellar-i18n/target/
            platform-core/target/
            platform-extension-api/target/
            platform-testkit/target/
            platform-persistence-jdbi/target/
            platform-sync-client/target/
            platform-security/target/
            platform-web/target/
          key: build-${{ github.sha }}

      - name: Install parent POM and modules locally
        run: >
          mvn install -N -q
          && mvn install
          -pl platform-jte-extensions,outerstellar-i18n,platform-core,platform-extension-api,platform-testkit,platform-persistence-jdbi,platform-sync-client,platform-security,platform-web
          -DskipTests -Dexec.skip=true -q
          -Ddetekt.skip=true -Dcheckstyle.skip=true -Dpmd.skip=true
          -Dcpd.skip=true -Dspotbugs.skip=true -Dspotless.apply.skip=true
          -Djacoco.skip=true -Denforcer.skip=true

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: platform-web/target/playwright-browsers
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Run E2E tests
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/platform-web/target/playwright-browsers
        run: >
          mvn test -pl platform-web
          -Dgroups=e2e
          -DexcludedGroups=
          -Denforcer.skip=true
          -Dcheckstyle.skip=true -Dpmd.skip=true -Dcpd.skip=true
          -Dspotbugs.skip=true -Dspotless.apply.skip=true
          -Djacoco.skip=true -Ddetekt.skip=true -Dexec.skip=true

  postgres-integration:
    name: PostgreSQL Integration Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ci
    permissions:
      contents: read
    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: outerstellar
          POSTGRES_USER: outerstellar
          POSTGRES_PASSWORD: outerstellar
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U outerstellar -d outerstellar"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: '**/pom.xml'
          server-id: github-rygel
          server-username: GITHUB_ACTOR
          server-password: GH_PACKAGES_TOKEN

      - name: Restore build output
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            platform-jte-extensions/target/
            outerstellar-i18n/target/
            platform-core/target/
            platform-extension-api/target/
            platform-testkit/target/
            platform-persistence-jdbi/target/
            platform-sync-client/target/
            platform-security/target/
            platform-web/target/
          key: build-${{ github.sha }}

      - name: Install parent POM and dependencies
        run: >
          mvn install -N -q
          && mvn install -pl outerstellar-i18n,platform-core,platform-security,platform-testkit,platform-persistence-jdbi
          -DskipTests -q
          -Ddetekt.skip=true -Dcheckstyle.skip=true -Dpmd.skip=true
          -Dcpd.skip=true -Dspotbugs.skip=true -Dspotless.apply.skip=true
          -Djacoco.skip=true -Denforcer.skip=true

      - name: Run persistence tests against PostgreSQL service
        run: >
          mvn verify -pl platform-persistence-jdbi
          -Ddetekt.skip=true -Dcheckstyle.skip=true -Dpmd.skip=true
          -Dcpd.skip=true -Dspotbugs.skip=true -Dspotless.apply.skip=true
          -Dspotless.check.skip=true -Denforcer.skip=true
          -Djacoco.skip=true
        env:
          TEST_JDBC_URL: jdbc:postgresql://localhost:5432/outerstellar
          TEST_JDBC_USER: outerstellar
          TEST_JDBC_PASSWORD: outerstellar

  coverage:
    name: Coverage Report
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    if: always()

    steps:
      - name: Download coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-*
          path: coverage-reports
          merge-multiple: true

      - name: Upload merged coverage reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          path: coverage-reports/
          retention-days: 14

  security:
    name: Security (OWASP + Enforcer)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ci
    permissions:
      contents: read
    env:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: '**/pom.xml'
          server-id: github-rygel
          server-username: GITHUB_ACTOR
          server-password: GH_PACKAGES_TOKEN

      - name: Cache NVD database
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: nvd-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: nvd-

      - name: OWASP dependency check
        run: >
          mvn org.owasp:dependency-check-maven:aggregate -DskipTests
          "-DnvdDatafeedUrl=https://dependency-check.github.io/DependencyCheck_Builder/nvd_cache/nvdcve-{0}.json.gz"
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload dependency check report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-check-report
          path: 'target/dependency-check-report.html'
          retention-days: 30
