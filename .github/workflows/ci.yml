name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    name: Build, Test, and Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ hashFiles('package-lock.json') }}

      - name: Build and run all checks
        run: mvn clean verify -pl core,persistence-jooq,persistence-jdbi,security,web,seed

      - name: Cache build output for desktop tests
        uses: actions/cache/save@v4
        with:
          path: |
            core/target/classes
            core/target/*.jar
            persistence-jooq/target/classes
            persistence-jooq/target/*.jar
            security/target/classes
            security/target/*.jar
          key: build-${{ github.sha }}

      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: '**/target/site/jacoco/'
          retention-days: 14

  desktop-tests:
    name: Desktop Tests (Xvfb)
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Restore build output
        uses: actions/cache/restore@v4
        with:
          path: |
            core/target/classes
            core/target/*.jar
            persistence-jooq/target/classes
            persistence-jooq/target/*.jar
            security/target/classes
            security/target/*.jar
          key: build-${{ github.sha }}

      - name: Install Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install cached modules
        run: mvn install -pl core,persistence-jooq,security -DskipTests -q

      - name: Run desktop tests with virtual display
        run: xvfb-run --auto-servernum mvn verify -pl desktop -Ddesktop.headless=false

  security:
    name: Security (OWASP + Enforcer)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: nvd-${{ github.run_id }}
          restore-keys: nvd-

      - name: OWASP dependency check
        run: mvn dependency-check:aggregate -DskipTests
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload dependency check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: 'target/dependency-check-report.html'
          retention-days: 30
