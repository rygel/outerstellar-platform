name: Sync main → develop

on:
  push:
    branches: [main]

permissions: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create sync branch and PR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if already in sync
          if git merge-base --is-ancestor main develop; then
            echo "main is already an ancestor of develop — nothing to sync."
            exit 0
          fi

          SYNC_BRANCH="sync/main-to-develop-$(date +%Y%m%d-%H%M%S)"
          git checkout develop
          git checkout -b "$SYNC_BRANCH"

          # Merge main; on conflict auto-resolve by taking main's version.
          # This is always correct for a main→develop sync: main is the source
          # of truth for released code, develop adds unreleased work on top.
          if ! git merge main --no-edit; then
            git checkout --theirs .
            git add -A
            git commit --no-edit -m "sync: merge main into develop (conflicts resolved by taking main)"
          fi

          git push origin "$SYNC_BRANCH"
          gh pr create \
            --base develop \
            --head "$SYNC_BRANCH" \
            --title "sync: merge main into develop" \
            --body "Automated sync of main into develop after release merge."

          # GitHub does not trigger CI on PRs created by the Actions bot.
          # Explicitly dispatch the CI workflow on the sync branch so checks run.
          gh workflow run ci.yml --ref "$SYNC_BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
