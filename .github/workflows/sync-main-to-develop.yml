name: Sync main → develop

on:
  push:
    branches: [main]

permissions: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create sync branch and PR
        run: |
          if [ -z "${SYNC_PR_TOKEN}" ]; then
            echo "::error::Missing SYNC_PR_TOKEN secret. Configure a fine-grained PAT or GitHub App token with contents:write and pull-requests:write. The default GITHUB_TOKEN cannot be used here because PRs it creates do not trigger the required pull_request CI checks."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          REMOTE="https://x-access-token:${SYNC_PR_TOKEN}@github.com/${{ github.repository }}.git"

          # Check if already in sync
          if git merge-base --is-ancestor main develop; then
            echo "main is already an ancestor of develop — nothing to sync."
            exit 0
          fi

          SYNC_BRANCH="sync/main-to-develop-$(date +%Y%m%d-%H%M%S)"
          git checkout develop
          git checkout -b "$SYNC_BRANCH"

          # Merge main; on conflict auto-resolve by taking main's version.
          # This is always correct for a main→develop sync: main is the source
          # of truth for released code, develop adds unreleased work on top.
          if ! git merge main --no-edit; then
            git checkout --theirs .
            git add -A
            git commit --no-edit -m "sync: merge main into develop (conflicts resolved by taking main)"
          fi

          git push "${REMOTE}" "$SYNC_BRANCH"
          gh pr create \
            --base develop \
            --head "$SYNC_BRANCH" \
            --title "sync: merge main into develop" \
            --body "Automated sync of main into develop after release merge."
        env:
          GH_TOKEN: ${{ secrets.SYNC_PR_TOKEN }}
          SYNC_PR_TOKEN: ${{ secrets.SYNC_PR_TOKEN }}
