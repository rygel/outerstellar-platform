name: Hadolint

on:
  push:
    branches: [main, develop]
    paths: ['**/Dockerfile*']
  pull_request:
    branches: [main, develop]
    paths: ['**/Dockerfile*']

permissions: {}

jobs:
  hadolint:
    name: Dockerfile Linting
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run Hadolint on docker/Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: docker/Dockerfile
          format: sarif
          output-file: hadolint-docker.sarif
          no-fail: true

      - name: Run Hadolint on docker/Dockerfile.test-desktop
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: docker/Dockerfile.test-desktop
          format: sarif
          output-file: hadolint-test-desktop.sarif
          no-fail: true

      - name: Upload Hadolint SARIF (docker)
        if: always()
        uses: github/codeql-action/upload-sarif@256d634097be96e792d6764f9edaefc4320557b1 # v4
        with:
          sarif_file: hadolint-docker.sarif
          category: hadolint-docker

      - name: Upload Hadolint SARIF (test-desktop)
        if: always()
        uses: github/codeql-action/upload-sarif@256d634097be96e792d6764f9edaefc4320557b1 # v4
        with:
          sarif_file: hadolint-test-desktop.sarif
          category: hadolint-test-desktop
