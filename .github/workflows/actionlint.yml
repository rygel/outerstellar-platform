name: actionlint

on:
  push:
    branches: [main, develop]
    paths: ['.github/workflows/**']
  pull_request:
    branches: [main, develop]
    paths: ['.github/workflows/**']

jobs:
  actionlint:
    name: Lint GitHub Actions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run actionlint
        uses: raven-actions/actionlint@v2
