name: Semgrep

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions: {}

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep@sha256:3dab091ee3247fce7e4ed3df9f92b3bd72692c083295f53cec3f135b86404db1 # latest as of 2026-03-28

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Semgrep
        run: >
          semgrep scan
          --config=p/kotlin
          --config=p/java
          --config=p/owasp-top-ten
          --config=p/secrets
          --sarif
          --output=semgrep.sarif
          --error

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: semgrep.sarif
          category: semgrep
